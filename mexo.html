<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TERMINAL - OVERRIDE IN PROGRESS</title>
    <style>
        /* Grunddesign des Terminals */
        body {
            background-color: #000;
            color: #03a01d;
            font-family: 'Courier New', Courier, monospace;
            padding: 20px;
            margin: 0;
            overflow: hidden;
            text-shadow: 0 0 5px #03a01d;
        }

        /* Matrix-ähnlicher Scanline-Effekt */
        body::before {
            content: " ";
            display: block;
            position: fixed;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            z-index: 2;
            background-size: 100% 2px, 3px 100%;
            pointer-events: none;
        }

        .terminal {
            max-width: 800px;
            margin: 0 auto;
        }

        /* Textzeilen-Animation */
        .line {
            visibility: hidden;
            white-space: nowrap;
            overflow: hidden;
            margin-bottom: 8px;
        }

        /* Aktiviert die Zeilen nacheinander */
        .line:nth-child(1) { animation: type 0.5s steps(40) forwards; animation-delay: 0.5s; visibility: visible; }
        .line:nth-child(2) { animation: type 0.5s steps(40) forwards; animation-delay: 1.2s; visibility: visible; }
        .line:nth-child(3) { animation: type 0.5s steps(40) forwards; animation-delay: 2.0s; visibility: visible; }
        .line:nth-child(4) { animation: type 0.5s steps(40) forwards; animation-delay: 2.8s; visibility: visible; }
        .line:nth-child(5) { animation: showBlock 0s forwards; animation-delay: 3.5s; }
        .line:nth-child(6) { animation: type 0.5s steps(40) forwards; animation-delay: 5.0s; visibility: visible; }
        
        /* Fortschrittsbalken-Animation */
        .progress-container {
            display: inline-block;
            width: 300px;
            border: 1px solid #03a01d;
            height: 15px;
            vertical-align: middle;
            margin-left: 10px;
        }

        .progress-bar {
            width: 0%;
            height: 100%;
            background-color: #03a01d;
            animation: fillBar 1.2s ease-in-out forwards;
            animation-delay: 3.6s;
        }

        /* Rote Alarmmeldung */
        .alert-box {
            border: 2px solid #ff0000;
            background-color: rgba(255, 0, 0, 0.1);
            color: #ff0000;
            padding: 15px;
            margin-top: 30px;
            text-align: center;
            font-weight: bold;
            font-size: 1.2rem;
            text-shadow: 0 0 5px #ff0000;
            opacity: 0;
            animation: showAlert 0.5s forwards, blink 0.8s infinite alternate;
            animation-delay: 5.8s;
        }

        /* Blinkender Cursor ganz unten */
        .cursor {
            display: inline-block;
            width: 10px;
            height: 15px;
            background-color: #03a01d;
            animation: blink 0.6s infinite alternate;
        }

        /* Keyframes für die Animationen */
        @keyframes type {
            from { width: 0; }
            to { width: 100%; }
        }

        @keyframes showBlock {
            to { visibility: visible; }
        }

        @keyframes fillBar {
            to { width: 100%; }
        }

        @keyframes showAlert {
            to { opacity: 1; }
        }

        @keyframes blink {
            from { opacity: 0; }
            to { opacity: 1; }
        }
    </style>
</head>
<body>

    <div class="terminal">
        <div class="line">> Connecting to root server (192.168.1.254)... SUCCESS.</div>
        <div class="line">> Injecting SQL payload via port 443...</div>
        <div class="line">> Bypassing main firewall proxy... DONE.</div>
        <div class="line">> Decrypting user_passwords.db...</div>
        <div class="line">
            > Progress: <div class="progress-container"><div class="progress-bar"></div></div>
        </div>
        <div class="line">> Downloading critical data packets...</div>
        
        <div class="alert-box">
            !!! SECURITY BREACH DETECTED !!!<br>
            SYSTEM OVERRIDE INITIATED
        </div>

        <p><span class="cursor"></span></p>
    </div>

</body>
</html>
