<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mexo | Hub</title>
    
    <link rel="icon" type="image/jpeg" href="pictures/mexo.profilbild.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --bg-main: #0a0712;
            --accent-cyan: #00f2fe;
            --accent-blue: #4facfe;
            --accent-purple: #a67cff;
            --text-main: #ffffff;
            --text-muted: #8b8ea8;
            --card-bg: rgba(255, 255, 255, 0.03);
            --card-border: rgba(255, 255, 255, 0.07);
            --glow: cubic-bezier(0.25, 1, 0.5, 1);
        }

        /* Dynamischer, animierter Hintergrund */
        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-main);
            background-image: 
                radial-gradient(at 0% 0%, rgba(166, 124, 255, 0.12) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(0, 242, 254, 0.1) 0px, transparent 50%),
                radial-gradient(at 50% 50%, rgba(13, 11, 20, 1) 0px, rgba(10, 7, 18, 1) 100%);
            background-attachment: fixed;
            color: var(--text-main);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Subtiler Grid-Overlay für Tech-Vibe */
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: linear-gradient(rgba(255, 255, 255, 0.005) 1px, transparent 1px), linear-gradient(90deg, rgba(255, 255, 255, 0.005) 1px, transparent 1px);
            background-size: 20px 20px;
            z-index: 0;
            pointer-events: none;
        }

        .container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 850px;
            padding: 40px 20px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            gap: 25px;
        }

        /* Zurück-Link */
        .back-link {
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 500;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s var(--glow);
            align-self: flex-start;
            padding: 6px 12px;
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid transparent;
        }
        
        .back-link:hover {
            color: var(--accent-cyan);
            border-color: rgba(0, 242, 254, 0.2);
            background: rgba(0, 242, 254, 0.05);
            transform: translateX(-3px);
        }

        /* Profil-Header */
        .profile {
            text-align: center;
            margin-bottom: 15px;
        }

        .avatar-wrapper {
            position: relative;
            width: 125px;
            height: 125px;
            margin: 0 auto;
        }

        .avatar {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 2px solid rgba(255, 255, 255, 0.2);
            object-fit: cover;
            transition: transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
            position: relative;
            z-index: 2;
        }

        /* Pulsierender Außenring */
        .avatar-wrapper::after {
            content: '';
            position: absolute;
            top: -4px; left: -4px; right: -4px; bottom: -4px;
            border-radius: 50%;
            background: linear-gradient(45deg, var(--accent-cyan), var(--accent-purple));
            z-index: 1;
            opacity: 0.6;
            filter: blur(4px);
            transition: all 0.5s var(--glow);
        }

        .avatar-wrapper:hover .avatar {
            transform: scale(1.05) rotate(3deg);
        }

        .avatar-wrapper:hover::after {
            transform: scale(1.12);
            opacity: 1;
            filter: blur(8px);
        }

        h1 {
            font-size: 2.5rem;
            margin: 20px 0 6px 0;
            font-weight: 800;
            background: linear-gradient(135deg, #ffffff 30%, #a67cff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.5px;
        }

        .tagline {
            font-size: 0.85rem;
            color: var(--accent-cyan);
            margin: 0;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 3px;
            text-shadow: 0 0 10px rgba(0, 242, 254, 0.3);
        }

        /* Grid-Layout */
        .main-content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 24px;
            width: 100%;
        }

        /* Glassmorphism Cards */
        .section-box {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 24px;
            padding: 30px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
            transition: all 0.4s var(--glow);
        }

        .section-box:hover {
            border-color: rgba(166, 124, 255, 0.25);
            box-shadow: 0 20px 40px rgba(166, 124, 255, 0.05);
            transform: translateY(-2px);
        }

        h3 {
            font-size: 1.2rem;
            margin-top: 0;
            margin-bottom: 22px;
            color: #ffffff;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            padding-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        h3 i {
            color: var(--accent-purple);
        }

        .rizz-text {
            font-size: 1.1rem;
            line-height: 1.6;
            color: #e2e8f0;
            font-weight: 500;
            background: linear-gradient(90deg, #fff, var(--text-muted));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Buttons-Struktur */
        .links-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .link-btn {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(255, 255, 255, 0.03);
            color: #e2e8f0;
            text-decoration: none;
            padding: 16px 20px;
            border-radius: 16px;
            font-weight: 600;
            font-size: 0.95rem;
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.3s var(--glow);
        }

        .link-content {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .link-btn i.platform-icon {
            font-size: 1.25rem;
            width: 24px;
            text-align: center;
            color: var(--accent-cyan);
            transition: transform 0.3s var(--glow);
        }

        .arrow-icon {
            font-size: 0.8rem;
            opacity: 0;
            color: var(--bg-main);
            transition: all 0.3s var(--glow);
            transform: translateX(-10px);
        }

        /* Interaktive Button-Animationen */
        .link-btn:hover {
            background: linear-gradient(90deg, var(--accent-cyan), var(--accent-blue));
            color: var(--bg-main);
            border-color: transparent;
            transform: scale(1.02);
            box-shadow: 0 10px 30px rgba(0, 242, 254, 0.25);
        }

        .link-btn:hover i.platform-icon {
            color: var(--bg-main);
            transform: scale(1.1);
        }

        .link-btn:hover .arrow-icon {
            opacity: 1;
            transform: translateX(0);
        }

        /* Footer */
        .footer {
            text-align: center;
            margin-top: 25px;
        }

        .footer p {
            font-size: 0.8rem;
            color: #4a475a;
            letter-spacing: 0.5px;
        }

        /* Responsive Anpassung */
        @media (max-width: 730px) {
            .main-content {
                grid-template-columns: 1fr;
            }
            .container {
                padding: 30px 16px;
            }
            h1 {
                font-size: 2.2rem;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        
        <a href="/" class="back-link">
            <i class="fas fa-arrow-left"></i> Hub verlassen
        </a>

        <header class="profile">
            <div class="avatar-wrapper">
                <img src="pictures/mexo.profilbild.png" alt="Mexo" class="avatar">
            </div>
            <h1>Mexo</h1>
            <p class="tagline">Developer</p> 
        </header>

        <main class="main-content">
            
            <section class="section-box">
                <h3><i class="fas fa-user-astronaut"></i> Status</h3>
                <p class="rizz-text">Ein Sigma Rizzler</p>
            </section>

            <section class="section-box">
                <h3><i class="fas fa-network-wired"></i> Netzwerke</h3>
                <div class="links-container">
                    
                    <a href="https://www.twitch.tv/marlow_jeep" target="_blank" class="link-btn">
                        <div class="link-content">
                            <i class="fab fa-twitch platform-icon"></i>
                            <span>Twitch</span>
                        </div>
                        <i class="fas fa-chevron-right arrow-icon"></i>
                    </a>

                    <a href="https://dc.gg/ben" target="_blank" class="link-btn">
                        <div class="link-content">
                            <i class="fab fa-discord platform-icon"></i>
                            <span>Discord</span>
                        </div>
                        <i class="fas fa-chevron-right arrow-icon"></i>
                    </a>

                    <a href="https://github.com/mexoOG" target="_blank" class="link-btn">
                        <div class="link-content">
                            <i class="fab fa-github platform-icon"></i>
                            <span>GitHub</span>
                        </div>
                        <i class="fas fa-chevron-right arrow-icon"></i>
                    </a>

                    <a href="https://www.tiktok.com/@mexoyt2.0" target="_blank" class="link-btn">
                        <div class="link-content">
                            <i class="fab fa-tiktok platform-icon"></i>
                            <span>TikTok</span>
                        </div>
                        <i class="fas fa-chevron-right arrow-icon"></i>
                    </a>
                    
                </div>
            </section>

        </main>

        <footer class="footer">
            <p>© 2026 @mexo • Powered by SynergyStation</p>
        </footer>
    </div>

</body>
</html>
