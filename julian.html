<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Julian - Links & Projects</title>
    
    <link rel="icon" type="image/jpeg" href="pictures/julian.profilbild.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        /* Base Reset & Setup */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow: hidden;
            
            /* HINTERGRUNDBILD HIER ANPASSEN */
            /* Ersetze 'japan_background.jpg' mit dem Namen deines Landschaftsbildes! */
            background-image: url('japan_background.jpg'), linear-gradient(135deg, #ff8a9c, #6c88b5, #192b4d);
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
        }

        /* Top Left Volume Button */
        .volume-btn {
            position: absolute;
            top: 25px;
            left: 25px;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            width: 45px;
            height: 45px;
            border-radius: 12px;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #3b2222;
            cursor: pointer;
            transition: all 0.2s ease;
            z-index: 100;
        }

        .volume-btn:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: scale(1.05);
        }

        /* Main Content Wrapper */
        .content-wrapper {
            display: flex;
            flex-direction: column;
            gap: 15px;
            width: 90%;
            max-width: 460px;
            z-index: 10;
        }

        /* Glassmorphism Reusable Class */
        .glass-panel {
            background: rgba(255, 255, 255, 0.35);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.15);
        }

        /* Main Profile Card */
        .profile-card {
            padding: 35px 25px 30px 25px;
            text-align: center;
            position: relative;
            /* Sakura Akzentlinie oben (Japan Style) */
            border-top: 3px solid rgba(255, 121, 198, 0.8); 
        }

        /* Das neue Profilbild */
        .main-profile-pic {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            object-fit: cover;
            margin: 0 auto 15px auto;
            display: block;
            border: 2px solid rgba(255, 255, 255, 0.6);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            transition: transform 0.3s ease;
        }

        .main-profile-pic:hover {
            transform: scale(1.05);
        }

        h1 {
            font-size: 2.2rem;
            color: #3b2222;
            margin-bottom: 5px;
            font-weight: 700;
            letter-spacing: 0.5px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        /* Japanischer Name / Schriftzug neben dem Titel */
        .kanji-name {
            font-size: 1.2rem;
            color: #ff5555;
            font-weight: 400;
            opacity: 0.8;
        }

        .bio {
            font-size: 0.95rem;
            color: #4a2a2a;
            line-height: 1.5;
            margin-bottom: 25px;
            font-weight: 500;
        }

        /* Japanischer Untertitel (Hanko/Stempel Style) */
        .bio-subtitle {
            font-size: 0.75rem;
            color: #ff5555;
            letter-spacing: 2px;
            text-transform: uppercase;
            font-weight: 700;
            margin-bottom: 15px;
            display: block;
        }

        /* Social Icons */
        .social-icons {
            display: flex;
            justify-content: center;
            gap: 15px;
            font-size: 1.4rem;
        }

        .social-icons a {
            color: #4a3b3b;
            text-decoration: none;
            transition: transform 0.2s, color 0.2s;
            display: inline-flex;
        }

        .social-icons a:hover {
            transform: translateY(-3px);
            color: #111;
        }

        .icon-whatsapp {
            color: #25D366 !important;
        }

        /* View Counter im Card-Eck */
        .view-counter {
            position: absolute;
            bottom: 12px;
            left: 15px;
            font-size: 0.75rem;
            color: #4a2a2a;
            display: flex;
            align-items: center;
            gap: 6px;
            font-weight: 600;
        }

        /* Music Player Widget */
        .music-player {
            padding: 12px;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .album-cover {
            width: 50px;
            height: 50px;
            border-radius: 10px;
            object-fit: cover;
            border: 1px solid rgba(255, 255, 255, 0.5);
        }

        .track-details {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .track-title {
            font-size: 0.9rem;
            font-weight: 700;
            color: #3b2222;
        }

        .track-progress-row {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.7rem;
            color: #5a3c3c;
            font-weight: 600;
        }

        .progress-bar-container {
            flex: 1;
            height: 6px;
            background: rgba(255, 255, 255, 0.4);
            border-radius: 3px;
            position: relative;
            cursor: pointer; /* Zeigt an, dass man klicken kann */
        }

        .progress-fill {
            position: absolute;
            left: 0;
            top: 0;
            height: 100%;
            width: 0%; /* Wird durch JS gesteuert */
            background: #ff5555; /* Rote Japan-Akzentfarbe für den Balken */
            border-radius: 3px;
            transition: width 0.1s linear;
        }

        .playback-controls {
            display: flex;
            gap: 12px;
            font-size: 0.95rem;
            margin-left: 5px;
            color: #3b2222;
        }
        
        .playback-controls i {
            cursor: pointer;
            transition: color 0.2s, transform 0.1s;
        }

        .playback-controls i:hover {
            color: #ff5555;
            transform: scale(1.1);
        }

        /* Footer Badge */
        .footer-badge {
            position: absolute;
            bottom: 25px;
            background: rgba(15, 15, 20, 0.7);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: 12px 25px 12px 20px;
            border-radius: 30px;
            display: flex;
            align-items: center;
            gap: 15px;
            color: white;
            text-decoration: none;
            border: 1px solid rgba(255,255,255,0.1);
            transition: all 0.2s ease;
        }

        .footer-badge:hover {
            background: rgba(15, 15, 20, 0.9);
            transform: translateY(-2px);
        }

        .footer-badge-icon {
            font-size: 1.2rem;
            color: #ff5555;
            transform: rotate(-45deg);
        }

        .footer-badge-text {
            display: flex;
            flex-direction: column;
        }

        .footer-badge-text strong {
            font-size: 0.85rem;
            letter-spacing: 0.5px;
        }

        .footer-badge-text span {
            font-size: 0.7rem;
            color: #aaaaaa;
        }

        .footer-badge-close {
            margin-left: 10px;
            font-size: 0.9rem;
            color: #777;
        }
    </style>
</head>
<body>

    <!-- Audio Player (Versteckt) -->
    <!-- WICHTIG: Füge hier bei src="..." deine Musik-Datei ein, z.B. src="music/mein_lied.mp3" -->
    <audio id="bg-audio" src="dein_lied.mp3" preload="metadata"></audio>

    <!-- Volume Button -->
    <div class="volume-btn" id="volume-btn">
        <i class="fas fa-volume-up"></i>
    </div>

    <!-- Main Container -->
    <div class="content-wrapper">
        
        <!-- Profile Card -->
        <main class="glass-panel profile-card">
            
            <!-- Profilbild hinzugefügt -->
            <img src="pictures/julian.profilbild.png" alt="Julian Profilbild" class="main-profile-pic">
            
            <h1>Julian <span class="kanji-name">ジュリアン</span></h1>
            <span class="bio-subtitle">クリエイター (Creator)</span>
            
            <p class="bio">
                🎉 Ich bin Julian ein Content Creator 🎉 Sharing<br>
                vibes! Join the Platforms for fun! 🎉
            </p>

            <div class="social-icons">
                <a href="#" target="_blank"><i class="fa-brands fa-spotify"></i></a>
                <a href="https://twitch.tv/julian442_" target="_blank"><i class="fa-brands fa-twitch"></i></a>
                <a href="https://youtube.com/@Julian_2044" target="_blank"><i class="fa-brands fa-youtube"></i></a>
                <a href="https://dc.gg/ben" target="_blank"><i class="fa-brands fa-discord"></i></a>
                <a href="#" target="_blank" class="icon-whatsapp"><i class="fa-brands fa-whatsapp"></i></a>
                <a href="#" target="_blank"><i class="fa-brands fa-tiktok"></i></a>
                <a href="#" target="_blank"><i class="fa-solid fa-gamepad"></i></a>
            </div>

            <div class="view-counter">
                <i class="fas fa-eye"></i> 15
            </div>
        </main>

        <!-- Music Player Widget -->
        <div class="glass-panel music-player">
            <img src="pictures/julian.profilbild.png" alt="Album Cover" class="album-cover">
            
            <div class="track-details">
                <div class="track-title">You Make me feel alive!</div>
                
                <div class="track-progress-row">
                    <span id="current-time">0:00</span>
                    <div class="progress-bar-container" id="progress-container">
                        <div class="progress-fill" id="progress-fill"></div>
                    </div>
                    <span id="duration-time">3:30</span>
                    
                    <div class="playback-controls">
                        <i class="fas fa-step-backward"></i>
                        <i class="fas fa-play" id="play-pause-btn"></i>
                        <i class="fas fa-step-forward"></i>
                    </div>
                </div>
            </div>
        </div>

    </div>

    <!-- Footer Banner -->
    <a href="https://github.com/SynergyStation" class="footer-badge" target="_blank">
        <i class="fas fa-link footer-badge-icon"></i>
        <div class="footer-badge-text">
            <strong>github.com/you</strong>
            <span>Sichere dir jetzt kostenlos dein Profil!</span>
        </div>
        <i class="fas fa-times footer-badge-close"></i>
    </a>

    <!-- JavaScript für den Musikplayer -->
    <script>
        document.addEventListener("DOMContentLoaded", function() {
            const audio = document.getElementById('bg-audio');
            const playPauseBtn = document.getElementById('play-pause-btn');
            const volumeBtn = document.getElementById('volume-btn');
            const volumeIcon = volumeBtn.querySelector('i');
            const progressFill = document.getElementById('progress-fill');
            const progressContainer = document.getElementById('progress-container');
            const currentTimeEl = document.getElementById('current-time');
            const durationTimeEl = document.getElementById('duration-time');

            // Format time (z.B. 65 Sekunden -> 1:05)
            function formatTime(seconds) {
                if (isNaN(seconds)) return "0:00";
                const min = Math.floor(seconds / 60);
                const sec = Math.floor(seconds % 60);
                return `${min}:${sec < 10 ? '0' : ''}${sec}`;
            }

            // Wenn Audio-Daten geladen sind, Gesamtlänge anzeigen
            audio.addEventListener('loadedmetadata', () => {
                durationTimeEl.textContent = formatTime(audio.duration);
            });

            // Play / Pause Funktion
            playPauseBtn.addEventListener('click', () => {
                if (audio.paused) {
                    audio.play();
                    playPauseBtn.classList.replace('fa-play', 'fa-pause');
                } else {
                    audio.pause();
                    playPauseBtn.classList.replace('fa-pause', 'fa-play');
                }
            });

            // Mute / Unmute (Oben Links)
            volumeBtn.addEventListener('click', () => {
                audio.muted = !audio.muted;
                if (audio.muted) {
                    volumeIcon.classList.replace('fa-volume-up', 'fa-volume-mute');
                } else {
                    volumeIcon.classList.replace('fa-volume-mute', 'fa-volume-up');
                }
            });

            // Fortschrittsbalken aktualisieren
            audio.addEventListener('timeupdate', () => {
                currentTimeEl.textContent = formatTime(audio.currentTime);
                const progressPercent = (audio.currentTime / audio.duration) * 100;
                progressFill.style.width = `${progressPercent}%`;
            });

            // In den Song klicken (Spulen)
            progressContainer.addEventListener('click', (e) => {
                const width = progressContainer.clientWidth;
                const clickX = e.offsetX;
                const duration = audio.duration;
                audio.currentTime = (clickX / width) * duration;
            });
            
            // Wenn das Lied zu Ende ist, Button wieder auf Play setzen
            audio.addEventListener('ended', () => {
                playPauseBtn.classList.replace('fa-pause', 'fa-play');
                progressFill.style.width = '0%';
                currentTimeEl.textContent = "0:00";
            });
        });
    </script>
</body>
</html>
