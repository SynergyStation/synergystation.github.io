<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Julian442 - Profile</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: sans-serif; min-height: 100vh; display: flex; justify-content: center; align-items: center; background: url('background/bg_Julian442.png') no-repeat center center fixed; background-size: cover; color: #ffffff; }
        .music-controls { position: absolute; top: 30px; left: 30px; display: flex; gap: 15px; z-index: 10; }
        .control-btn { background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.2); width: 45px; height: 45px; border-radius: 50%; color: white; cursor: pointer; }
        .card { background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.2); border-radius: 25px; width: 90%; max-width: 450px; text-align: center; padding: 40px; }
    </style>
</head>
<body>

    <!-- Wir benutzen hier keinen Ordnerpfad, um Fehler zu vermeiden -->
    <audio id="bg-audio" loop>
        <source src="song_Julian442.mp3" type="audio/mpeg">
    </audio>

    <div class="music-controls">
        <button class="control-btn" id="play-pause-btn"><i class="fas fa-play" id="play-icon"></i></button>
    </div>

    <script>
        const audio = document.getElementById('bg-audio');
        const playBtn = document.getElementById('play-pause-btn');
        const playIcon = document.getElementById('play-icon');

        playBtn.onclick = () => {
            if (audio.paused) {
                audio.play().then(() => {
                    playIcon.className = "fas fa-pause";
                }).catch(err => {
                    console.error("Audio-Fehler: Datei unter 'song_Julian442.mp3' nicht gefunden!", err);
                });
            } else {
                audio.pause();
                playIcon.className = "fas fa-play";
            }
        };
    </script>
</body>
</html>
