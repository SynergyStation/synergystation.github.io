<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Julian442 - Profile</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@400;500;700&family=Kaisei+Decol:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Zen Kaku Gothic New', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            /* Relativer Pfad zum Ordner "background" */
            background: url('background/bg_Julian442.png') no-repeat center center fixed;
            background-size: cover;
            color: #3a2b30;
            position: relative;
            overflow: hidden;
        }

        /* dezente Sakura-Blüten im Hintergrund, schwebend */
        .sakura {
            position: fixed;
            top: -10%;
            font-size: 1.6rem;
            color: #ffb7c5;
            opacity: 0.85;
            pointer-events: none;
            animation: fall linear infinite;
            z-index: 1;
        }
        @keyframes fall {
            0%   { transform: translateY(0) rotate(0deg); }
            100% { transform: translateY(110vh) rotate(360deg); }
        }

        .music-controls { position: absolute; top: 30px; left: 30px; display: flex; align-items: center; gap: 15px; z-index: 10; }
        .control-btn {
            background: rgba(255, 255, 255, 0.25);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 183, 197, 0.5);
            width: 45px; height: 45px;
            border-radius: 50%;
            color: #d1447a;
            cursor: pointer;
            transition: 0.3s;
        }
        .control-btn:hover { background: rgba(255, 143, 171, 0.5); color: #ffffff; }

        #volume-slider {
            -webkit-appearance: none;
            appearance: none;
            width: 90px;
            height: 4px;
            border-radius: 4px;
            background: linear-gradient(to right, #d1447a 0%, #d1447a 30%, rgba(255,255,255,0.5) 30%, rgba(255,255,255,0.5) 100%);
            cursor: pointer;
            outline: none;
        }
        #volume-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: #ffffff;
            border: 2px solid #d1447a;
            box-shadow: 0 2px 6px rgba(209, 68, 122, 0.4);
            transition: transform 0.2s;
        }
        #volume-slider::-webkit-slider-thumb:hover { transform: scale(1.15); }
        #volume-slider::-moz-range-track {
            height: 4px;
            border-radius: 4px;
            background: rgba(255,255,255,0.5);
        }
        #volume-slider::-moz-range-progress {
            height: 4px;
            border-radius: 4px;
            background: #d1447a;
        }
        #volume-slider::-moz-range-thumb {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: #ffffff;
            border: 2px solid #d1447a;
            box-shadow: 0 2px 6px rgba(209, 68, 122, 0.4);
            cursor: pointer;
        }

        .card {
            position: relative;
            z-index: 5;
            /* Transparenter Farbverlauf von Weiß zu Pink, Japan-Stil */
            background: linear-gradient(160deg,
                rgba(255, 255, 255, 0.55) 0%,
                rgba(255, 214, 224, 0.45) 45%,
                rgba(255, 158, 185, 0.4) 100%);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.6);
            border-radius: 30px;
            width: 90%;
            max-width: 450px;
            text-align: center;
            padding: 45px 40px;
            box-shadow: 0 10px 35px rgba(255, 140, 170, 0.25);
        }

        .card::before {
            content: "桜";
            position: absolute;
            top: 10px;
            right: 18px;
            font-family: 'Kaisei Decol', serif;
            font-size: 1.4rem;
            color: rgba(255, 255, 255, 0.7);
        }

        .avatar {
            width: 85px; height: 85px;
            border-radius: 50%;
            margin-bottom: 15px;
            border: 3px solid rgba(255, 255, 255, 0.8);
            box-shadow: 0 4px 15px rgba(255, 105, 145, 0.35);
        }

        h1 {
            font-family: 'Kaisei Decol', serif;
            font-size: 2rem;
            color: #d1447a;
            text-shadow: 0 1px 6px rgba(255,255,255,0.6);
        }

        .tagline {
            margin-top: 6px;
            font-size: 0.85rem;
            letter-spacing: 1px;
            color: #5a3d47;
        }

        .socials { display: flex; justify-content: center; gap: 22px; font-size: 1.5rem; margin-top: 25px; }
        .socials a {
            color: #b23a63;
            opacity: 0.9;
            transition: 0.3s;
            display: inline-block;
        }
        .socials a:hover { opacity: 1; color: #ff5c8a; transform: translateY(-3px) scale(1.1); }

        .corner-link {
            position: fixed;
            bottom: 25px;
            right: 25px;
            z-index: 10;
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(255, 255, 255, 0.25);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 183, 197, 0.5);
            border-radius: 16px;
            padding: 10px 16px;
            text-decoration: none;
            color: #b23a63;
            font-size: 0.85rem;
            font-weight: 500;
            box-shadow: 0 6px 20px rgba(255, 140, 170, 0.25);
            transition: 0.3s;
        }
        .corner-link:hover {
            background: rgba(255, 143, 171, 0.5);
            color: #ffffff;
            transform: translateY(-3px);
        }
        .corner-link i { font-size: 1rem; }

        .like-wrap {
            margin-top: 22px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 12px;
        }

        .like-btn {
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(255, 255, 255, 0.35);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 183, 197, 0.6);
            border-radius: 30px;
            padding: 10px 20px;
            color: #d1447a;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            font-size: 0.9rem;
            font-weight: 600;
            letter-spacing: 0.2px;
            cursor: pointer;
            transition: 0.25s;
        }
        .like-btn i { font-size: 1.05rem; transition: transform 0.25s; }
        .like-btn:hover { background: rgba(255, 143, 171, 0.5); color: #ffffff; }
        .like-btn.liked { background: #ff5c8a; color: #ffffff; }
        .like-btn.liked i { transform: scale(1.15); }
        .like-btn.pop i { animation: pop 0.35s ease; }
        @keyframes pop {
            0%   { transform: scale(1); }
            40%  { transform: scale(1.4); }
            100% { transform: scale(1.15); }
        }

        .like-count {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            font-size: 0.85rem;
            color: #5a3d47;
            font-weight: 500;
            letter-spacing: 0.2px;
        }

        /* Statusanzeige für Musik */
        #audio-status-log {
            font-size: 0.75rem;
            color: #d1447a;
            margin-top: 10px;
            opacity: 0.7;
        }

        /* Reset-Hinweis (nur sichtbar bei ?reset=true) */
        #reset-log {
            font-size: 0.75rem;
            color: #b23a63;
            margin-top: 6px;
            opacity: 0.85;
        }
    </style>
</head>
<body>

    <!-- schwebende Sakura-Blüten -->
    <span class="sakura" style="left:3%; font-size:1.2rem; animation-duration:10s; animation-delay:0s;">🌸</span>
    <span class="sakura" style="left:8%; animation-duration:9s; animation-delay:1.2s;">🌸</span>
    <span class="sakura" style="left:15%; font-size:1.1rem; animation-duration:13s; animation-delay:2.8s;">🌸</span>
    <span class="sakura" style="left:22%; animation-duration:12s; animation-delay:2s;">🌸</span>
    <span class="sakura" style="left:30%; font-size:1.8rem; animation-duration:11s; animation-delay:0.7s;">🌸</span>
    <span class="sakura" style="left:40%; animation-duration:10s; animation-delay:1s;">🌸</span>
    <span class="sakura" style="left:48%; font-size:1.3rem; animation-duration:15s; animation-delay:3.5s;">🌸</span>
    <span class="sakura" style="left:55%; font-size:1.9rem; animation-duration:9.5s; animation-delay:1.8s;">🌸</span>
    <span class="sakura" style="left:60%; animation-duration:14s; animation-delay:3s;">🌸</span>
    <span class="sakura" style="left:68%; font-size:1.2rem; animation-duration:12.5s; animation-delay:0.3s;">🌸</span>
    <span class="sakura" style="left:78%; animation-duration:11s; animation-delay:0.5s;">🌸</span>
    <span class="sakura" style="left:85%; font-size:1.7rem; animation-duration:10.5s; animation-delay:2.2s;">🌸</span>
    <span class="sakura" style="left:90%; animation-duration:13s; animation-delay:2.5s;">🌸</span>
    <span class="sakura" style="left:96%; font-size:1.1rem; animation-duration:9s; animation-delay:4s;">🌸</span>

    <audio id="bg-audio" loop preload="auto">
        <source src="/music/Pitanga.mp3" type="audio/mpeg">
    </audio>

    <div class="music-controls">
        <button class="control-btn" id="play-pause-btn"><i class="fas fa-play" id="play-icon"></i></button>
        <button class="control-btn" id="volume-btn"><i class="fas fa-volume-up" id="vol-icon"></i></button>
        <input type="range" id="volume-slider" min="0" max="1" step="0.01" value="0.3" title="Lautstärke">
    </div>

    <div class="card">
        <img src="pictures/julian.profilbild.png" class="avatar" alt="Avatar">
        <h1>Julian 🌸</h1>
        <p class="tagline">✨ CONTENT CREATOR • SHARING VIBES 🎮</p>

        <div class="socials">
            <a href="https://github.com/Julixn442" title="GitHub"><i class="fab fa-github"></i></a>
            <a href="https://twitch.tv/julian442_" title="Twitch"><i class="fab fa-twitch"></i></a>
            <a href="https://youtube.com/@Julian_2044" title="YouTube"><i class="fab fa-youtube"></i></a>
            <a href="https://dc.gg/ben" title="Discord"><i class="fab fa-discord"></i></a>
        </div>

        <div class="like-wrap">
            <button class="like-btn" id="like-btn">
                <i class="fas fa-heart"></i>
                <span id="like-label">Like</span>
            </button>
            <span class="like-count" id="like-count">– likes</span>
        </div>

        <div id="audio-status-log">Musik wird vorbereitet...</div>
        <div id="reset-log"></div>
    </div>

    <a href="https://synergystation.github.io/" class="corner-link" target="_blank" rel="noopener noreferrer">
        <i class="fas fa-arrow-up-right-from-square"></i>
        Synergy Station
    </a>

    <script>
        const audio = document.getElementById('bg-audio');
        const playBtn = document.getElementById('play-pause-btn');
        const playIcon = document.getElementById('play-icon');
        const volBtn = document.getElementById('volume-btn');
        const volIcon = document.getElementById('vol-icon');
        const volSlider = document.getElementById('volume-slider');
        const statusLog = document.getElementById('audio-status-log');

        audio.volume = 0.3;

        function updateSliderTrack() {
            const pct = Math.round(volSlider.value * 100);
            volSlider.style.background = `linear-gradient(to right, #d1447a 0%, #d1447a ${pct}%, rgba(255,255,255,0.5) ${pct}%, rgba(255,255,255,0.5) 100%)`;
        }
        updateSliderTrack();

        // Überwacht Ladefehler der Datei
        audio.addEventListener('error', (e) => {
            statusLog.textContent = "Fehler: Musikdatei nicht gefunden oder defekt!";
            console.error("Audio-Fehler aufgetreten:", e);
        });

        audio.addEventListener('canplaythrough', () => {
            if (audio.paused) {
                statusLog.textContent = "Musik bereit. Klicke oben links zum Starten 🎵";
            }
        });

        // Direkter Klick auf den runden Play/Pause-Button oben links
        playBtn.onclick = () => {
            if (audio.paused) {
                statusLog.textContent = "Wiedergabe angefordert...";
                audio.play()
                    .then(() => {
                        playIcon.className = "fas fa-pause";
                        statusLog.textContent = "Musik läuft 🎵";
                    })
                    .catch(err => {
                        statusLog.textContent = "Wiedergabe vom Browser verweigert.";
                        console.error("Fehler beim Abspielen:", err);
                    });
            } else {
                audio.pause();
                playIcon.className = "fas fa-play";
                statusLog.textContent = "Musik pausiert";
            }
        };

        volBtn.onclick = () => {
            audio.muted = !audio.muted;
            volIcon.className = audio.muted ? "fas fa-volume-mute" : "fas fa-volume-up";
        };

        volSlider.oninput = () => {
            audio.volume = volSlider.value;
            audio.muted = false;
            volIcon.className = audio.volume === 0 ? "fas fa-volume-mute" : "fas fa-volume-up";
            updateSliderTrack();
        };

        // Autoplay-Versuch (wird meistens geblockt, fängt aber die erste Nutzerinteraktion ab)
        function initAutoplay() {
            audio.play()
                .then(() => {
                    playIcon.className = "fas fa-pause";
                    statusLog.textContent = "Musik läuft 🎵";
                })
                .catch(() => {
                    const interactionEvents = ['click', 'touchstart', 'keydown'];
                    const triggerOnUser = () => {
                        if (audio.paused) {
                            audio.play().then(() => {
                                playIcon.className = "fas fa-pause";
                                statusLog.textContent = "Musik läuft 🎵";
                            }).catch(() => {});
                        }
                        interactionEvents.forEach(event => document.removeEventListener(event, triggerOnUser));
                    };
                    interactionEvents.forEach(event => document.addEventListener(event, triggerOnUser, { once: true, passive: true }));
                });
        }

        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', initAutoplay);
        } else {
            initAutoplay();
        }

        // --- Like-Funktion ---
        const LIKE_KEY = "julian442-profile-likes-v1";
        const LIKE_HIT_URL = `https://countapi.mileshilliard.com/api/v1/hit/${LIKE_KEY}`;
        const LIKE_GET_URL = `https://countapi.mileshilliard.com/api/v1/get/${LIKE_KEY}`;
        const likeSetUrl = (value) => `https://countapi.mileshilliard.com/api/v1/set/${LIKE_KEY}?value=${value}`;
        const likeBtn = document.getElementById('like-btn');
        const likeLabel = document.getElementById('like-label');
        const likeCount = document.getElementById('like-count');
        const resetLog = document.getElementById('reset-log');

        function renderCount(n) {
            likeCount.textContent = `${n} ${n === 1 ? 'Like' : 'Likes'}`;
        }

        function setLikedState() {
            likeBtn.classList.add('liked');
            likeLabel.textContent = 'Geliked';
            likeBtn.disabled = true;
        }

        function clearLikedState() {
            likeBtn.classList.remove('liked', 'pop');
            likeLabel.textContent = 'Like';
            likeBtn.disabled = false;
        }

        // --- Reset per URL-Parameter: ?reset=true ---
        // Setzt den globalen Zähler (CountAPI) auf 0 zurück UND löscht den
        // lokalen "schon geliked"-Status in diesem Browser.
        // --- Beliebigen Wert setzen per URL-Parameter: ?likes=ZAHL ---
        // Setzt den globalen Zähler (CountAPI) direkt auf die angegebene Zahl.
        const params = new URLSearchParams(window.location.search);
        const shouldReset = params.get('reset') === 'true';
        const likesParam = params.get('likes');
        const shouldSetLikes = likesParam !== null && !isNaN(parseInt(likesParam));

        function performReset() {
            resetLog.textContent = "Setze Likes zurück...";
            localStorage.removeItem('julian442_liked');
            clearLikedState();

            fetch(likeSetUrl(0))
                .then(res => res.json())
                .then(() => {
                    renderCount(0);
                    resetLog.textContent = "Likes wurden auf 0 zurückgesetzt ✅";
                    // Parameter aus der URL entfernen, damit ein Reload nicht erneut resettet
                    params.delete('reset');
                    const newUrl = window.location.pathname + (params.toString() ? `?${params.toString()}` : '');
                    window.history.replaceState({}, '', newUrl);
                })
                .catch(() => {
                    renderCount(0);
                    resetLog.textContent = "Lokal zurückgesetzt, globaler Zähler evtl. nicht erreichbar.";
                });
        }

        function performSetLikes() {
            const newValue = parseInt(likesParam);
            resetLog.textContent = `Setze Likes auf ${newValue}...`;

            fetch(likeSetUrl(newValue))
                .then(res => res.json())
                .then(() => {
                    renderCount(newValue);
                    resetLog.textContent = `Likes wurden auf ${newValue} gesetzt ✅`;
                    // Parameter aus der URL entfernen, damit ein Reload nicht erneut setzt
                    params.delete('likes');
                    const newUrl = window.location.pathname + (params.toString() ? `?${params.toString()}` : '');
                    window.history.replaceState({}, '', newUrl);
                })
                .catch(() => {
                    resetLog.textContent = "Globaler Zähler evtl. nicht erreichbar.";
                });
        }

        if (shouldReset) {
            performReset();
        } else if (shouldSetLikes) {
            performSetLikes();
        } else {
            const hasLiked = localStorage.getItem('julian442_liked') === 'true';

            fetch(LIKE_GET_URL)
                .then(res => res.json())
                .then(data => renderCount(data.value ?? 0))
                .catch(() => renderCount(localStorage.getItem('julian442_liked') === 'true' ? 1 : 0));

            if (hasLiked) setLikedState();
        }

        likeBtn.onclick = () => {
            if (localStorage.getItem('julian442_liked') === 'true') return;

            fetch(LIKE_HIT_URL)
                .then(res => res.json())
                .then(data => {
                    renderCount(data.value);
                    localStorage.setItem('julian442_liked', 'true');
                    setLikedState();
                    likeBtn.classList.add('pop');
                })
                .catch(() => {
                    localStorage.setItem('julian442_liked', 'true');
                    setLikedState();
                    likeBtn.classList.add('pop');
                    renderCount(1);
                });
        };
    </script>
</body>
</html>
